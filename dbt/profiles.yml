netflix_analytics:
  target: prod
  outputs:
    prod:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID', 'netflix-user-behavior-490622') }}"
      dataset: "{{ env_var('BQ_DATASET_RAW', 'netflix_raw') }}"
      keyfile: /opt/keys/gcp-sa.json
      location: europe-west1
      threads: 4
      timeout_seconds: 300
      priority: interactive