version: "3"

services:

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spark-airflow-network

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: _Q4TmKis-woXafbYQPmPn3m3QTBxzcIk4U9SiuMvh9k=
      GCP_PROJECT_ID:                  ${GCP_PROJECT_ID:-netflix-user-behavior-490622}
      GOOGLE_APPLICATION_CREDENTIALS:  /opt/keys/gcp-sa.json
    volumes:
      - ./infra/terraform/keys/netflix-user-behavior-creds.json:/opt/keys/gcp-sa.json:ro
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow db upgrade

        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com || true

        airflow connections delete google_cloud_default 2>/dev/null || true
        airflow connections add google_cloud_default \
          --conn-type  google_cloud_platform \
          --conn-extra "{
            \"project\": \"${GCP_PROJECT_ID:-netflix-user-behavior-490622}\",
            \"key_path\": \"/opt/keys/gcp-sa.json\",
            \"scope\":    \"https://www.googleapis.com/auth/cloud-platform\"
          }"

        echo ">>> airflow-init complete"
    networks:
      - spark-airflow-network

  webserver:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR:              LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:  postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES:         "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG:    "true"
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "true"
      AIRFLOW__CORE__FERNET_KEY:            _Q4TmKis-woXafbYQPmPn3m3QTBxzcIk4U9SiuMvh9k=
      AIRFLOW__WEBSERVER__RBAC:             "true"
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT:  "9000"
      PYTHONPATH:                           /opt/airflow/jobs/dbt
      GCP_PROJECT_ID:                  ${GCP_PROJECT_ID:-netflix-user-behavior-490622}
      GCS_BUCKET_NAME:                 ${GCS_BUCKET_NAME:-netflix-user-behavior-data-lake}
      GCS_RAW_PREFIX:                  ${GCS_RAW_PREFIX:-raw/netflix_behavior}
      BQ_DATASET_RAW:                  ${BQ_DATASET_RAW:-netflix_raw}
      BQ_DATASET_CURATED:              ${BQ_DATASET_CURATED:-netflix_curated}
      BQ_DATASET_MARTS:                ${BQ_DATASET_MARTS:-netflix_marts}
      SPARK_MASTER:                    ${SPARK_MASTER:-spark://spark-master:7077}
      NETFLIX_CSV_PATH:                ${NETFLIX_CSV_PATH:-/opt/airflow/data/movies.csv}
      NETFLIX_OBJECT_PREFIX:           ${NETFLIX_OBJECT_PREFIX:-movies}
      GOOGLE_APPLICATION_CREDENTIALS:  /opt/keys/gcp-sa.json
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./dbt:/opt/airflow/jobs/dbt
      - ./infra/terraform/keys/netflix-user-behavior-creds.json:/opt/keys/gcp-sa.json:ro
    ports:
      - "9000:9000"
    command: webserver
    networks:
      - spark-airflow-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR:             LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY:           _Q4TmKis-woXafbYQPmPn3m3QTBxzcIk4U9SiuMvh9k=
      PYTHONPATH:                          /opt/airflow/jobs/dbt
      GCP_PROJECT_ID:                  ${GCP_PROJECT_ID:-netflix-user-behavior-490622}
      GCS_BUCKET_NAME:                 ${GCS_BUCKET_NAME:-netflix-user-behavior-data-lake}
      GCS_RAW_PREFIX:                  ${GCS_RAW_PREFIX:-raw/netflix_behavior}
      BQ_DATASET_RAW:                  ${BQ_DATASET_RAW:-netflix_raw}
      BQ_DATASET_CURATED:              ${BQ_DATASET_CURATED:-netflix_curated}
      BQ_DATASET_MARTS:                ${BQ_DATASET_MARTS:-netflix_marts}
      SPARK_MASTER:                    ${SPARK_MASTER:-spark://spark-master:7077}
      NETFLIX_CSV_PATH:                ${NETFLIX_CSV_PATH:-/opt/airflow/data/movies.csv}
      NETFLIX_OBJECT_PREFIX:           ${NETFLIX_OBJECT_PREFIX:-movies}
      GOOGLE_APPLICATION_CREDENTIALS:  /opt/keys/gcp-sa.json
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./dbt:/opt/airflow/jobs/dbt
      - ./infra/terraform/keys/netflix-user-behavior-creds.json:/opt/keys/gcp-sa.json:ro
    command: scheduler
    networks:
      - spark-airflow-network
  
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ""   # 👈 THIS FIXES IT
    depends_on:
      - webserver
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /opt/keys/gcp-sa.json
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-netflix-user-behavior-490622}
    volumes:
      - ./streamlit:/opt/streamlit
      - ./infra/terraform/keys/netflix-user-behavior-creds.json:/opt/keys/gcp-sa.json:ro
    ports:
      - "8501:8501"
    command: >
      streamlit run /opt/streamlit/streamlit_app.py
      --server.port=8501
      --server.address=0.0.0.0
    networks:
      - spark-airflow-network

networks:
  spark-airflow-network:
    external: true
